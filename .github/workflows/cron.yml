name: Scheduled Cron Job

# Trigger the workflow on a schedule, manual dispatch, or when this file changes
on:
  push:
    paths:
      - '.github/workflows/cronjob.yml'  # Run only if this workflow file changes
  schedule:
    - cron: '2 * * * *'  # Runs every 2 minutes
  workflow_dispatch:      # Allows manual trigger from GitHub UI

jobs:
  example_cron_job:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run Python code
        run: |
          python -c "print('Hello from GitHub Actions!')"

      - name: Run a script
        run: |
          echo "Hello! This cron job ran at $(date)"
          # Add any commands or scripts you want to run here